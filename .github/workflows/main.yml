name: Build

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    tags: [ v* ]
  pull_request:

jobs:
  build-openwrt:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            sdk: https://downloads.openwrt.org/releases/24.10.2/targets/x86/64/openwrt-toolchain-24.10.2-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          - target: aarch64-unknown-linux-musl
            sdk: https://downloads.openwrt.org/releases/24.10.2/targets/armsr/armv8/openwrt-toolchain-24.10.2-armsr-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          - target: mipsel-unknown-linux-musl
            sdk: https://downloads.openwrt.org/releases/24.10.2/targets/ramips/mt7621/openwrt-toolchain-24.10.2-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64.tar.zst
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build
        run: |
          rustup toolchain add nightly
          rustup +nightly component add rust-src
          rustup +nightly target add ${{ matrix.target }} || true
          mkdir -p ~/openwrt
          wget "${{ matrix.sdk }}" -qO- | tar --strip-components 1 -C ~/openwrt -xv --zstd
          toolchain="$(ls -d ~/openwrt/toolchain-*)"
          if [ "${{ matrix.target }}" == "mipsel-unknown-linux-musl" ]; then
            res_dir="$(ls -d ${toolchain}/lib/gcc/*/*)"
            cp ${res_dir}/libgcc.a ${res_dir}/libunwind.a
            export RUSTFLAGS="-Ctarget-feature=+crt-static -Zlocation-detail=none -Zunstable-options -Cpanic=immediate-abort -Clinker=$(ls ${toolchain}/bin/*-openwrt-linux-gcc) -L${toolchain}/lib -L${res_dir}"
          else
            export RUSTFLAGS="-Ctarget-feature=+crt-static -Zlocation-detail=none -Zunstable-options -Cpanic=immediate-abort -Clinker=$(ls ${toolchain}/bin/*-openwrt-linux-gcc)"
          fi
          cargo +nightly build -Zbuild-std=std,panic_abort -r --target ${{ matrix.target }}
          upx -9 target/${{ matrix.target }}/release/iptv
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: target/${{ matrix.target }}/release/iptv
  build-windows:
    name: Build x86_64-pc-windows-gnu
    runs-on: windows-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        pacboy: upx:p
    - name: Build
      env:
        RUSTFLAGS: -Ctarget-feature=-crt-static -Zunstable-options -Cpanic=immediate-abort -Zlocation-detail=none
      run: |
        rustup set default-host x86_64-pc-windows-gnu
        rustup toolchain add nightly-gnu
        rustup +nightly component add rust-src
        cargo +nightly build -Z build-std=std,panic_abort -r --target x86_64-pc-windows-gnu
        msys2 -c 'upx -9 ./target/x86_64-pc-windows-gnu/release/iptv.exe'
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: x86_64-pc-windows-gnu
        path: target/x86_64-pc-windows-gnu/release/iptv.exe

  build-docker:
    name: Build Docker Image
    needs: build-openwrt
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download amd64 Binary
        uses: actions/download-artifact@v4
        with:
          name: x86_64-unknown-linux-musl
          path: ./iptv-amd64-dir

      - name: Download arm64 Binary
        uses: actions/download-artifact@v4
        with:
          name: aarch64-unknown-linux-musl
          path: ./iptv-arm64-dir

      - name: Prepare Binaries
        run: |
          mv ./iptv-amd64-dir/iptv ./iptv-amd64
          mv ./iptv-arm64-dir/iptv ./iptv-arm64
          rm -rf ./iptv-amd64-dir ./iptv-arm64-dir
          chmod +x ./iptv-amd64 ./iptv-arm64

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/rust-iptv-proxy
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

